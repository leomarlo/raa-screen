<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raa Admin</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e0e0e0;
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --danger: #d93025;
      --success-bg: #e6f4ea;
      --success-text: #137333;
      --error-bg: #fce8e6;
      --error-text: #c5221f;
      --text: #202124;
      --muted: #5f6368;
      --active-bg: #e8f0fe;
      --active-border: #1a73e8;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }

    .auth { display: flex; align-items: center; gap: 8px; }

    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #bdc1c6;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .status-dot.connected { background: #34a853; }
    .status-dot.error     { background: #ea4335; }

    .status-label {
      font-size: 12px;
      color: var(--muted);
    }

    input, select, textarea {
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
    }

    button {
      padding: 7px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s;
      white-space: nowrap;
      font-family: inherit;
    }

    button:hover { background: #f0f0f0; }
    button.primary { background: var(--primary); color: white; border-color: var(--primary); }
    button.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    button.danger { color: var(--danger); border-color: #f5c6c4; }
    button.danger:hover { background: var(--error-bg); }

    main {
      max-width: 800px;
      margin: 24px auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    /* Resource rows */
    .resource-row {
      display: flex;
      align-items: flex-start;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      gap: 14px;
    }
    .resource-row:last-child { border-bottom: none; }
    .resource-row.is-active {
      background: var(--active-bg);
      border-left: 3px solid var(--active-border);
      padding-left: 17px;
    }

    .resource-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }

    .resource-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .kind-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .kind-direct, .kind-hls { background: #e6f4ea; color: #137333; }
    .kind-youtube             { background: #fce8e6; color: #c5221f; }
    .kind-image               { background: #e8f0fe; color: #1557b0; }
    .kind-web                 { background: #f3e8fd; color: #7b1fa2; }

    .default-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      background: #fef9e7;
      color: #b45309;
      border: 1px solid #fde68a;
    }

    .resource-title { font-weight: 500; }
    .active-pill { font-size: 11px; font-weight: 600; color: var(--primary); }

    .resource-url {
      font-size: 12px;
      color: var(--primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-decoration: none;
    }
    .resource-url:hover { text-decoration: underline; }

    .resource-desc { font-size: 12px; color: var(--muted); }

    .resource-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }

    .pill {
      font-size: 11px;
      padding: 1px 8px;
      border-radius: 20px;
      background: #f1f3f4;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .poster-thumb {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .resource-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: flex-start; padding-top: 2px; }

    .empty-state { padding: 40px; text-align: center; color: var(--muted); }

    /* Add form */
    .add-form { padding: 20px; display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; font-weight: 500; color: var(--muted); }
    .field input, .field select, .field textarea { width: 100%; }
    .field textarea { resize: vertical; min-height: 56px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    .form-actions { display: flex; gap: 8px; padding-top: 2px; }

    #message {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      display: none;
    }
    #message.success { display: block; background: var(--success-bg); color: var(--success-text); }
    #message.error   { display: block; background: var(--error-bg);   color: var(--error-text); }

    #auth-input { width: 200px; }
    #resources-section { display: none; }
  </style>

  <!-- MIME type suggestions -->
  <datalist id="mime-options">
    <option value="video/mp4">
    <option value="video/webm">
    <option value="video/ogg">
    <option value="video/quicktime">
    <option value="application/x-mpegURL">
    <option value="image/jpeg">
    <option value="image/png">
    <option value="image/gif">
    <option value="image/webp">
    <option value="image/svg+xml">
  </datalist>
</head>
<body>

<header>
  <h1>Raa Screen Admin</h1>
  <div class="auth">
    <span class="status-dot" id="status-dot" title="Not connected"></span>
    <span class="status-label" id="status-label">not connected</span>
    <input type="password" id="auth-input" placeholder="Admin password"
           onkeydown="if(event.key==='Enter') loadResources()" />
    <button onclick="loadResources()">Connect</button>
  </div>
</header>

<main>
  <div id="message"></div>

  <section id="resources-section" class="card">
    <div class="card-header">
      Resources
      <button class="danger" style="font-size:12px;padding:4px 10px" onclick="resetResources()">Reset all</button>
    </div>
    <div id="resource-list"></div>
  </section>

  <section class="card">
    <div class="card-header">Add Resource</div>
    <div class="add-form">

      <div class="form-row">
        <div class="field">
          <label>Kind *</label>
          <select id="f-kind" onchange="onKindChange()">
            <option value="direct">direct — video file (mp4, webm…)</option>
            <option value="hls">hls — m3u8 stream</option>
            <option value="youtube">youtube — YouTube URL</option>
            <option value="image">image — jpg, png, gif…</option>
            <option value="web">web — full webpage</option>
          </select>
        </div>
        <div class="field" id="mime-field">
          <label>MIME type</label>
          <input type="text" id="f-mime" list="mime-options" placeholder="e.g. video/mp4" autocomplete="off" />
        </div>
      </div>

      <div class="field">
        <label>URL *</label>
        <input type="url" id="f-url" placeholder="https://…" />
      </div>

      <div class="form-row">
        <div class="field">
          <label>Title</label>
          <input type="text" id="f-title" placeholder="Display name" />
        </div>
        <div class="field">
          <label>Poster / thumbnail URL</label>
          <input type="url" id="f-poster" placeholder="https://…" />
        </div>
      </div>

      <div class="field">
        <label>Description</label>
        <textarea id="f-desc" placeholder="Optional notes about this resource…"></textarea>
      </div>

      <div class="form-actions">
        <button onclick="addResource(false)">Add</button>
        <button class="primary" onclick="addResource(true)">Add &amp; Activate</button>
      </div>
    </div>
  </section>
</main>

<script>
  function pass() {
    return document.getElementById('auth-input').value.trim();
  }

  function savePass() {
    const p = pass();
    if (p) sessionStorage.setItem('raa_pass', p);
  }

  function setStatus(state) {
    // state: 'connected' | 'error' | 'idle'
    const dot   = document.getElementById('status-dot');
    const label = document.getElementById('status-label');
    dot.className = 'status-dot ' + (state === 'connected' ? 'connected' : state === 'error' ? 'error' : '');
    label.textContent = state === 'connected' ? 'connected' : state === 'error' ? 'wrong password' : 'not connected';
  }

  async function api(method, path, body) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json', 'x-admin-password': pass() },
    };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    if (res.status === 204) return null;
    const data = await res.json().catch(() => ({ detail: res.statusText }));
    if (!res.ok) throw new Error(data.detail || res.statusText);
    return data;
  }

  async function loadResources() {
    savePass();
    try {
      const data = await api('GET', '/admin/resources');
      renderResources(data);
      document.getElementById('resources-section').style.display = 'block';
      setStatus('connected');
      showMessage('', '');
    } catch (e) {
      setStatus('error');
      showMessage(e.message, 'error');
    }
  }

  function renderResources(data) {
    const list = document.getElementById('resource-list');

    if (!data.resources.length) {
      list.innerHTML = '<div class="empty-state">No resources yet. Add one below.</div>';
      return;
    }

    list.innerHTML = '';
    for (const r of data.resources) {
      const row = document.createElement('div');
      row.className = 'resource-row' + (r.is_active ? ' is-active' : '');

      const pills = [];
      if (r.mime_type) pills.push(r.mime_type);

      row.innerHTML = `
        ${r.poster_url ? `<img class="poster-thumb" src="${esc(r.poster_url)}" alt="" onerror="this.style.display='none'" />` : ''}
        <div class="resource-meta">
          <div class="resource-top">
            <span class="kind-badge kind-${r.kind}">${r.kind}</span>
            ${r.is_default ? '<span class="default-badge">built-in default</span>' : ''}
            ${r.title ? `<span class="resource-title">${esc(r.title)}</span>` : ''}
            ${r.is_active ? '<span class="active-pill">● active</span>' : ''}
          </div>
          <a class="resource-url" href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.url)}</a>
          ${r.description ? `<div class="resource-desc">${esc(r.description)}</div>` : ''}
          ${pills.length ? `<div class="resource-pills">${pills.map(p => `<span class="pill">${esc(p)}</span>`).join('')}</div>` : ''}
        </div>
        <div class="resource-actions">
          ${!r.is_active && !r.is_default
            ? `<button onclick="activateResource('${r.id}')">Activate</button>
               <button class="danger" onclick="removeResource('${r.id}')">Remove</button>`
            : ''}
        </div>
      `;
      list.appendChild(row);
    }
  }

  async function addResource(activate) {
    const kind   = document.getElementById('f-kind').value;
    const url    = document.getElementById('f-url').value.trim();
    const title  = document.getElementById('f-title').value.trim();
    const mime   = document.getElementById('f-mime').value.trim();
    const poster = document.getElementById('f-poster').value.trim();
    const desc   = document.getElementById('f-desc').value.trim();

    if (!url) { showMessage('URL is required', 'error'); return; }

    const body = { kind, url };
    if (title)  body.title       = title;
    if (mime)   body.mime_type   = mime;
    if (poster) body.poster_url  = poster;
    if (desc)   body.description = desc;

    try {
      await api('POST', `/admin/resources?activate=${activate}`, body);
      ['f-url', 'f-title', 'f-mime', 'f-poster', 'f-desc'].forEach(id => {
        const el = document.getElementById(id);
        el.tagName === 'TEXTAREA' ? (el.value = '') : (el.value = '');
      });
      showMessage(activate ? 'Resource added and activated.' : 'Resource added.', 'success');
      loadResources();
    } catch (e) {
      showMessage(e.message, 'error');
    }
  }

  async function activateResource(id) {
    try {
      await api('POST', `/admin/resources/${id}/activate`);
      showMessage('Resource activated.', 'success');
      loadResources();
    } catch (e) {
      showMessage(e.message, 'error');
    }
  }

  async function removeResource(id) {
    if (!confirm('Remove this resource?')) return;
    try {
      await api('DELETE', `/admin/resources/${id}`);
      showMessage('Resource removed.', 'success');
      loadResources();
    } catch (e) {
      showMessage(e.message, 'error');
    }
  }

  async function resetResources() {
    if (!confirm('Remove ALL resources and revert to the built-in default?')) return;
    try {
      await api('DELETE', '/admin/resources');
      showMessage('All resources removed.', 'success');
      loadResources();
    } catch (e) {
      showMessage(e.message, 'error');
    }
  }

  function onKindChange() {
    const kind = document.getElementById('f-kind').value;
    document.getElementById('mime-field').style.display =
      (kind === 'web' || kind === 'youtube') ? 'none' : '';
  }

  function showMessage(msg, type) {
    const el = document.getElementById('message');
    el.textContent = msg;
    el.className = type ? 'message ' + type : '';
    if (msg && type === 'success') setTimeout(() => { el.className = ''; el.textContent = ''; }, 3000);
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  window.addEventListener('load', () => {
    const saved = sessionStorage.getItem('raa_pass');
    if (saved) {
      document.getElementById('auth-input').value = saved;
      loadResources();
    }
  });
</script>
</body>
</html>
